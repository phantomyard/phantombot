name: Release on PR merge

# Fires for every PR merged into main. Cuts a GitHub Release tagged
# v1.0.<PR_NUMBER> with two cross-compiled binaries (x64-baseline + arm64)
# and a SHA256SUMS file. `phantombot update` reads this feed.
#
# Why every PR (not manual tags): the user runs `phantombot update --force
# --restart` from cron and wants always-fresh binaries. If a PR shouldn't
# release, we'll add a `release:skip` label gate later.
#
# Why bun-linux-x64-baseline (and not plain bun-linux-x64): one of the
# deploy targets (the `kw-openclaw` supervisor box that runs kai) is older
# silicon without AVX2. The non-baseline target SIGILLs on launch there.
# Don't 'optimise' to plain x64 without verifying every deploy target has
# AVX2 — see the SIGILL post-mortem from the May 2026 first deploy.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write   # create release + upload assets

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to a major to keep releases reproducible. A point-release
          # regression in `bun --compile` would otherwise silently break
          # every PR merge until upstream ships a fix, and historical
          # binaries wouldn't carry a recoverable build-toolchain version.
          bun-version: 1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Test
        run: bun test

      - name: Compute version + bake into src/version.ts
        id: version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          VERSION="1.0.${PR_NUMBER}"
          TAG="v${VERSION}"
          # Replace only the literal placeholder so the doc comment in
          # src/version.ts (and any future sibling const) survives. The
          # placeholder must round-trip exactly; see the file's comment.
          sed -i "s/0.1.0-dev/${VERSION}/" src/version.ts
          # Sanity check: the constant must now match VERSION exactly,
          # otherwise the binary would lie about its own version and
          # phantombot update would loop.
          grep -q "VERSION = \"${VERSION}\"" src/version.ts \
            || { echo "version injection failed"; cat src/version.ts; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build x64 (baseline — no AVX2 required)
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64-baseline \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-linux-x64"

      - name: Build arm64
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          bun build --compile --target=bun-linux-arm64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-linux-arm64"

      - name: Build darwin-arm64 (Apple Silicon)
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Cross-compiled from the Linux runner; Bun emits an unsigned
          # Mach-O. First-run on macOS will be quarantined by Gatekeeper —
          # see release notes for the `xattr -d com.apple.quarantine` step.
          # No darwin-x64 build: no current deploy target uses Intel Macs.
          bun build --compile --target=bun-darwin-arm64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-darwin-arm64"

      - name: Compute SHA256SUMS
        working-directory: dist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          sha256sum \
            "phantombot-${TAG}-linux-x64" \
            "phantombot-${TAG}-linux-arm64" \
            "phantombot-${TAG}-darwin-arm64" \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Write release notes to file
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          cat > release-notes.md <<EOF
          Automated release for PR #${PR_NUMBER}: ${PR_TITLE}

          Binaries:
          - phantombot-${TAG}-linux-x64 — x86-64, baseline (no AVX2 required)
          - phantombot-${TAG}-linux-arm64 — ARM64
          - phantombot-${TAG}-darwin-arm64 — macOS Apple Silicon (unsigned; see below)

          Verify with: sha256sum -c SHA256SUMS

          Install with: phantombot update

          macOS note: the darwin-arm64 binary is cross-compiled and unsigned.
          On first run, clear the Gatekeeper quarantine attribute:
            xattr -d com.apple.quarantine ./phantombot-${TAG}-darwin-arm64
          EOF

      - name: Create GitHub Release with binary assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # --target pins the git tag to the merge commit we built from.
          # Without it, a second PR landing mid-workflow would shift the
          # tag onto the wrong sha (binaries would still be correct, but
          # `git checkout v1.0.N` would lie about what code is in there).
          gh release create "$TAG" \
            --target "${{ github.event.pull_request.merge_commit_sha }}" \
            --title "$TAG" \
            --notes-file release-notes.md \
            "dist/phantombot-${TAG}-linux-x64" \
            "dist/phantombot-${TAG}-linux-arm64" \
            "dist/phantombot-${TAG}-darwin-arm64" \
            "dist/SHA256SUMS"
